# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Face ID for Intercom
version: "3.6.0"
slug: faceid_intercom
description: FaceId for Intercom
url: "https://github.com/danieltabrizian/IntercomFaceid/tree/main/intercomfaceid"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
ingress: true
ingress_port: 8099
map:
  - config:rw
  - data:rw
hassio_api: true
memory: "512M"
devices:
  - /dev/ttyUSB0:/dev/ttyUSB0
  - /dev/video0:/dev/video0
ports:
  "1984/tcp": 11984   # go2rtc web UI / API
  "8554/tcp": 18654   # go2rtc RTSP (H264) -> HA camera (18554 = HA's own go2rtc)
  "8555/tcp": 18655   # go2rtc WebRTC (18555 = HA's own go2rtc)
  "8555/udp": 18655
ports_description:
  "1984/tcp": "go2rtc web UI / API"
  "8554/tcp": "go2rtc RTSP stream"
  "8555/tcp": "go2rtc WebRTC (tcp)"
  "8555/udp": "go2rtc WebRTC (udp)"
options:
  usb_port: "/dev/ttyUSB0"
  baudrate: 9600
schema:
  usb_port: str
  baudrate: int
build:
  dockerfile: Dockerfile
  args:
    - BUILD_FROM=docker.io/danieltabrizian/intercomfaceid:latest"
