# go2rtc config — bundled camera restreamer inside the Face ID add-on.
#
# Ports are container-internal defaults; the add-on maps them to non-default HOST
# ports (see config.yaml) so they don't collide with Home Assistant's own bundled
# go2rtc (which runs on the host on 1984/8554/8555).
#
# STAGE A: source is motionEye's MJPEG stream (no USB contention, no downtime).
#   -> proves the H264/RTSP/WebRTC/HLS pipeline while motionEye still owns the cam.
# STAGE B (later): switch `webcam` to the USB device and retire motionEye:
#   webcam: ffmpeg:device?video=/dev/video0&input_format=mjpeg&video_size=640x480&framerate=15

api:
  listen: ":1984"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  candidates:
    - 192.168.2.45:18655   # host-mapped WebRTC port (see config.yaml ports)

ffmpeg:
  bin: ffmpeg

streams:
  # Track 1: native MJPEG passthrough straight from the USB cam (cheap — used by
  #          the Face ID recognizer, and the source for everything else).
  # Track 2: H264 transcode of the same stream (for HA stream/WebRTC/HLS/HomeKit),
  #          only running when an H264 consumer is connected (on-demand).
  webcam:
    - ffmpeg:device?video=/dev/video0&input_format=mjpeg&video_size=640x480&framerate=15
    # Software H264 encode. VAAPI (#hardware=vaapi) was tried but the iHD encoder
    # EOF-crashes repeatedly on this Gen9.5 iGPU (same fragility as OpenVINO), so
    # it stays software for reliability.
    - ffmpeg:webcam#video=h264

log:
  level: info
